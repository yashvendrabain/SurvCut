# Local dev stack. Bring up with `docker compose -f infra/docker-compose.yml up`.
# Ports: api 8000, redis 6379, web 3000.
# For hot-reload dev, prefer running api and web directly (uvicorn --reload / pnpm dev)
# and only use compose when you want a docker-parity check.

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379/0
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    environment:
      - API_URL=http://api:8000

networks:
  default:
    name: survcut-net