name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python — engine + api
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install engine + api (editable)
        run: |
          python -m pip install --upgrade pip
          pip install -e ./engine
          pip install -e ./api
          pip install pytest httpx

      - name: Engine tests
        working-directory: ./engine
        run: python -m pytest -q

      - name: API tests
        working-directory: ./api
        run: python -m pytest -q

  node:
    name: Node — web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install (accept React 19 peers)
        working-directory: ./web
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build (also generates next-env.d.ts)
        working-directory: ./web
        run: npm run build

      - name: Typecheck (post-build so next-env.d.ts exists)
        working-directory: ./web
        run: npm run typecheck

      - name: Lint (non-blocking for now)
        working-directory: ./web
        run: npm run lint || echo "lint issues — not blocking Week 1"
        continue-on-error: true